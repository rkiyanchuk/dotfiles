symbolPreset: nerd
theme:
  dark: dark-one
  light: light-one
setupVersion: 1
modelRoles:
  default: "@task"
  slow: claude-opus-4-8:max
  plan: "@slow:xhigh"
  task: claude-sonnet-5:high
  vision: claude-sonnet-5
  advisor: claude-haiku-4-5
  commit: claude-haiku-4-5
  smol: claude-haiku-4-5
statusLine:
  separator: none
  transparent: true
  compactThinkingLevel: true
  preset: custom
  leftSegments:
    - path
    - git
    - pr
    - model
    - mode
    - context_pct
  rightSegments:
    - subagents
    - session_name
    - time_spent
    - cost
    - hostname
  segmentOptions:
    model:
      showThinkingLevel: true
    path:
      abbreviate: true
      maxLength: 30
    git:
      showBranch: true
      showStaged: true
      showUnstaged: true
      showUntracked: true
    time:
      format: 24h
      showSeconds: false
  sessionAccent: false
terminal:
  showProgress: true
personality: pragmatic
retry:
  maxRetries: 5
stt:
  enabled: true
  modelName: parakeet
startup:
  quiet: false
marketplace:
  autoUpdate: auto
power:
  sleepPrevention: idle
memory:
  backend: mnemopi
mnemopi:
  scoping: per-project-tagged
  embeddingVariant: multilingual
hideThinkingBlock: true
defaultThinkingLevel: auto
disabledProviders:
  - codex
