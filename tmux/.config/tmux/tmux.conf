set -g default-terminal "tmux-256color"
set -gas terminal-features ",ghostty:RGB,hyperlinks,osc7,strikethrough,usstyle"
set -gas terminal-features ",xterm-256color:RGB"

set -g escape-time 0
set -g focus-events on
set -g allow-passthrough on

set -g mode-keys vi
set -g monitor-activity on
set -g mouse on
set -g visual-activity off
set -g set-titles on
set -g set-titles-string "#T"


# BINDINGS
# ========

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# Fix Home/End keys in Tmux under macOS.
bind -n End send-key C-e
bind -n Home send-key C-a

# Pane splits (preserve current path)
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
bind-key "%" split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key "c" new-window -c "#{pane_current_path}"

# Pane navigation
bind-key h   select-pane -L
bind-key C-h select-pane -L
bind-key j   select-pane -D
bind-key C-j select-pane -D
bind-key k   select-pane -U
bind-key C-k select-pane -U
bind-key l   select-pane -R
bind-key C-l select-pane -R

# Pane resizing
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Window swapping
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1


# PLUGINS
# =======

# Theme options
set -g @tokyo-night-tmux_theme "storm"
set -g @tokyo-night-tmux_transparent 0
# set -g @tokyo-night-tmux_window_id_style "none"
set -g @tokyo-night-tmux_pane_id_style "hide"
set -g @tokyo-night-tmux_zoom_id_style "dsquare"
set -g @tokyo-night-tmux_show_music 0
set -g @tokyo-night-tmux_show_netspeed 0
set -g @tokyo-night-tmux_show_wbg 0

# Install Tmux plugin manager with:
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '${HOME}/.config/tmux/plugins/tpm/tpm'

# Pill-shaped window indicators (overrides plugin format after TPM runs)
# Storm theme colors: status bg #24283b, active bg #414868, active accent #73daca
set -g window-status-current-format "#[fg=#414868,bg=#24283b]#[fg=#73daca,bg=#414868,bold] #I #[fg=#a9b1d6]#W #[fg=#414868,bg=#24283b,nobold]"
set -g window-status-format "#[fg=#2d3248,bg=#24283b]#[fg=#565f89,bg=#2d3248] #I #[fg=#a9b1d6]#W #[fg=#2d3248,bg=#24283b,nobold]"
set -g status-left "#[fg=#7aa2f7,bg=#24283b]#[fg=#414868,bg=#7aa2f7,bold] #{?client_prefix,󰠠 ,#[dim]󰤂 }#[bold,nodim]#S #[fg=#7aa2f7,bg=#24283b,nobold] "
set -g window-status-separator " "
