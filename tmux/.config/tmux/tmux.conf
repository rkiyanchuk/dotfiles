set -g default-terminal "tmux-256color"
set -gas terminal-features ",ghostty:RGB,hyperlinks,osc7,strikethrough,usstyle"
set -gas terminal-features ",xterm-256color:RGB"

set -g escape-time 0
set -g focus-events on
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g mode-keys vi
set -g monitor-activity on
set -g mouse on
set -g visual-activity off
set -g set-titles on
set -g set-titles-string "#T"


# BINDINGS
# ========

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'V' send -X select-line
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel "pbcopy"

# Fix Home/End keys in Tmux under macOS.
bind -n End send-key C-e
bind -n Home send-key C-a

# Pane splits (preserve current path)
bind-key "|" split-window -h -c "#{pane_current_path}"
bind-key "\\" split-window -fh -c "#{pane_current_path}"
bind-key "-" split-window -v -c "#{pane_current_path}"
bind-key "_" split-window -fv -c "#{pane_current_path}"
bind-key "%" split-window -h -c "#{pane_current_path}"
bind-key '"' split-window -v -c "#{pane_current_path}"
bind-key "c" new-window -c "#{pane_current_path}"

# Pane navigation
bind-key h   select-pane -L
bind-key C-h select-pane -L
bind-key j   select-pane -D
bind-key C-j select-pane -D
bind-key k   select-pane -U
bind-key C-k select-pane -U
bind-key l   select-pane -R
bind-key C-l select-pane -R

# Pane resizing
bind-key -r H resize-pane -L 5
bind-key -r J resize-pane -D 5
bind-key -r K resize-pane -U 5
bind-key -r L resize-pane -R 5

# Window swapping
bind-key -r "<" swap-window -d -t -1
bind-key -r ">" swap-window -d -t +1


# PLUGINS
# =======

# Install Tmux plugin manager with:
# git clone https://github.com/tmux-plugins/tpm ~/.config/tmux/plugins/tpm
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'odedlaz/tmux-onedark-theme'
set -g @plugin 'tmux-plugins/tmux-sensible'

run '${HOME}/.config/tmux/plugins/tpm/tpm'

# Pill-shaped window indicators (overrides plugin format after TPM runs)
# One Dark colors: status bg #282c34, active bg #3e4451, active accent #61afef
set -g window-status-current-format "#[fg=#3e4451,bg=#282c34]#[fg=#61afef,bg=#3e4451,bold] #I #[fg=#abb2bf]#W #[fg=#3e4451,bg=#282c34,nobold]"
set -g window-status-format "#[fg=#353b45,bg=#282c34]#[fg=#565c64,bg=#353b45] #I #[fg=#abb2bf]#W #[fg=#353b45,bg=#282c34,nobold]"
set -g status-left "#[fg=#61afef,bg=#282c34]#[fg=#3e4451,bg=#61afef,bold] #{?client_prefix,󰠠 ,#[dim]󰤂 }#[bold,nodim]#S #[fg=#61afef,bg=#282c34,nobold] "
set -g window-status-separator " "
set -g mode-style "bg=#3e4451,fg=#61afef"
set -g status-right "#[fg=#61afef,bg=#282c34]#[fg=#282c34,bg=#61afef,bold] #h #[fg=#61afef,bg=#282c34,nobold]"
